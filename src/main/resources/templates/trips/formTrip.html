<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>TripApp | Publicar Oferta de Trip</title>
    <link th:href="@{/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/bootstrap/css/jumbotron.css}" rel="stylesheet">
    <link th:href="@{/bootstrap/css/sticky-footer-navbar.css}" rel="stylesheet">
    <link href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css" rel="stylesheet">
</head>
<body>
    <header th:insert="~{fragments/menu :: menu-principal}"></header>

    <main role="main">
        <hr>
        <div class="container">
            <div class="card">
                <h4 class="card-header"><strong>Datos del Trip</strong></h4>
                <div class="card-body">
                    <form th:action="@{/trips/save}" method="post" th:object="${trip}">
                        
                        <div th:if="${#fields.hasErrors('*')}" class='alert alert-danger' role='alert'>
                            <strong>Por favor corrija los siguientes errores:</strong>
                            <ul>
                                <li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
                            </ul>
                        </div>

                        <div class="row">
                            <div class="col-md-3">
                                <div class="form-group">
                                    <label for="nombre">Nombre</label> 
                                    <input type="text" class="form-control" th:field="*{nombre}" id="nombre" placeholder="Titulo del trip" required>
                                </div>
                            </div>
                            <div class="col-md-9">
                                <div class="form-group">
                                    <label for="descripcion">Descripción</label> 
                                    <input type="text" class="form-control" th:field="*{descripcion}" id="descripcion" placeholder="Breve descripción">
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-3">
                                <div class="form-group">
                                    <label for="categoria">Categoría</label> 
                                    <select class="form-control" th:field="*{categoria.id}" id="categoria">
                                        <option th:each="cat : ${categorias}" 
                                                th:value="${cat.id}" 
                                                th:text="${cat.nombre}"></option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="form-group">
                                    <label for="estatus">Estatus</label> 
                                    <select class="form-control" th:field="*{estatus}" id="estatus">
                                        <option value="Creada">Creada</option>
                                        <option value="Aprobada">Aprobada</option>
                                        <option value="Eliminada">Eliminada</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="form-group">
                                    <label for="fecha">Fecha de Publicación</label> 
                                    <input type="text" class="form-control" th:field="*{fecha}" id="fecha" placeholder="dd-mm-yyyy" required>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <label><strong>Destacado</strong></label><br>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" th:field="*{destacado}" id="destacado1" value="1">
                                    <label class="form-check-label" for="destacado1">SI</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" th:field="*{destacado}" id="destacado2" value="0">
                                    <label class="form-check-label" for="destacado2">NO</label>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-3">
                                <div class="form-group">
                                    <label for="costo">Costo del Trip</label> 
                                    <input type="text" class="form-control" th:field="*{costo}" id="costo" required>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="form-group">
                                    <label for="archivoImagen">Imagen</label> 
                                    <input type="file" class="form-control-file" name="archivoImagen" id="archivoImagen">
                                </div>
                            </div>
                        </div>

                        <hr>
                        <div class="row">
                            <div class="col-md-9">
                                <div class="form-group">
                                    <label for="detalles"><strong>Detalles</strong></label>
                                    <textarea class="form-control" th:field="*{detalles}" id="detalles" rows="7"></textarea>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <label>Imagen/Logo</label> 
                                <img class="rounded mx-auto d-block" th:src="@{/images/no-image.png}" width="200" height="200">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">Guardar</button>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <footer class="footer" th:insert="~{fragments/footer :: pie-pagina}"></footer>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>
    <script th:src="@{/bootstrap/js/bootstrap.min.js}"></script>
    <script th:src="@{/tinymce/tinymce.min.js}"></script>
    <script>
        $(function() {
            $("#fecha").datepicker({ dateFormat: 'dd-mm-yy' });
        });
        tinymce.init({
            selector: '#detalles',
            plugins: "textcolor, table lists code",
            toolbar: "undo redo | bold italic | alignleft aligncenter alignright alignjustify | bullist numlist outdent indent | forecolor backcolor table code"
        }); 
    </script>
</body>
</html>
