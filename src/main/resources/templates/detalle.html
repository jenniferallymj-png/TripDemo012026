<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>TripApp | Detalle del Trip</title>
    <link th:href="@{/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/bootstrap/css/jumbotron.css}" rel="stylesheet">
    <link th:href="@{/bootstrap/css/sticky-footer-navbar.css}" rel="stylesheet">
  </head>
  <body>
    <header th:insert="~{fragments/menu :: menu-principal}"></header>
    <main role="main">
      <hr>
      <div class="container"> 
        <div class="row">
          <div class="col-md-3">            
            <img class="rounded mx-auto d-block" th:src="@{/images/{img} (img=${trip.imagen})}" alt="Imagen del trip" width="220" height="220">            
          </div>
          <div class="col-md-9">
            <div class="card">
              <h4 class="card-header">Trip: <strong th:text="${trip.nombre}"></strong></h4>              
              <div class="card-body">
                <h5 class="card-title"><strong>Categoría: </strong> <span th:text="${trip.categoria.nombre}"></span></h5>
                
                <h6 class="card-title"><strong>Publicado: </strong> <span th:text="${#dates.format(trip.fecha, 'dd-MM-yyyy')}"></span></h6>                
                <h6 class="card-title"><strong>Costo: </strong><span th:text="${trip.costo}"></span></h6>
                <p class="card-text" th:text="${trip.descripcion}"></p>
                <div class="card bg-light mb-3" >
                  <div class="card-body">
                    <h5 class="card-title">Detalles del Trip</h5>
                    <div class="card-text" th:utext="${trip.detalles}">
                        Contenido con formato HTML desde la base de datos.
                    </div>
                  </div>
                </div>   
                <a class="btn btn-primary" href="#" role="button"><i class="fas fa-file"></i> Comprar</a>                            
              </div>
            </div>  
          </div>
        </div>
      </div>
    </main>
    <footer th:insert="~{fragments/footer :: pie-pagina}"></footer>
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script th:src="@{/bootstrap/js/bootstrap.min.js}"></script>
  </body>
</html>
